// ─── STATE ────────────────────────────────────────────────────────────────────
const state = { data: {}, photos: {}, activeTab: "zameni" };

const allFields = TABS.flatMap(t => t.groups.flatMap(g => g.fields.filter(f => f.type !== "photo_only")));
document.getElementById("total-count").textContent = allFields.length;

function updateStats() {
  const filled = allFields.filter(f => state.data[f.key] !== undefined && state.data[f.key] !== "").length;
  document.getElementById("filled-count").textContent = filled;
  const totalP = Object.values(state.photos).reduce((s,a)=>s+(a?.length||0),0);
  document.getElementById("photo-count").textContent = totalP + (totalP===1?" fotka":totalP<5?" fotky":" fotek");
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function renderTabs() {
  const inner = document.getElementById("tabs-inner");
  inner.innerHTML = "";
  TABS.forEach(t => {
    const btn = document.createElement("button");
    btn.className = "tab-btn" + (state.activeTab === t.key ? " active" : "");
    btn.textContent = t.icon + " " + t.label;
    if (state.activeTab === t.key) {
      btn.style.color = t.color;
      btn.style.borderBottomColor = t.color;
    }
    btn.onclick = () => { state.activeTab = t.key; render(); };
    inner.appendChild(btn);
  });
}

function renderField(f, tabColor) {
  const hint = INFO[f.label];
  const div = document.createElement("div");
  div.className = "field";

  if (f.type === "photo_only") {
    div.innerHTML = `<label>${escHtml(f.label)}${hint ? infoBtn(hint) : ""}</label>`;
    div.appendChild(makePhotoUpload(f.key));
    return div;
  }

  const labelEl = document.createElement("label");
  labelEl.innerHTML = escHtml(f.label) + (f.unit ? `<span class="unit">(${f.unit})</span>` : "") + (hint ? infoBtn(hint) : "");
  div.appendChild(labelEl);

  let input;
  if (f.type === "textarea") {
    input = document.createElement("textarea");
    input.rows = 2;
    input.placeholder = "Váš text…";
    input.value = state.data[f.key] || "";
  } else if (f.type === "select") {
    input = document.createElement("select");
    input.innerHTML = `<option value="">– vyberte –</option>` + f.options.map(o => `<option${state.data[f.key]===o?" selected":""}>${escHtml(o)}</option>`).join("");
  } else {
    input = document.createElement("input");
    input.type = f.type === "number" ? "number" : "text";
    input.placeholder = f.type === "number" ? "0" : "Zadejte hodnotu…";
    input.value = state.data[f.key] || "";
    if (f.type === "number") input.step = "any";
  }
  input.oninput = input.onchange = () => { state.data[f.key] = input.value; updateStats(); };
  div.appendChild(input);

  if (f.photo && f.type !== "photo_only") div.appendChild(makePhotoUpload(f.key));
  return div;
}

function makePhotoUpload(key) {
  const wrap = document.createElement("div");
  wrap.id = "photo-wrap-" + key;

  const fileInput = document.createElement("input");
  fileInput.type = "file"; fileInput.accept = "image/*"; fileInput.multiple = true;
  fileInput.setAttribute("capture","environment");
  fileInput.style.display = "none";
  fileInput.onchange = e => {
    Array.from(e.target.files).forEach(file => {
      const r = new FileReader();
      r.onload = ev => {
        if (!state.photos[key]) state.photos[key] = [];
        state.photos[key].push({name:file.name, data:ev.target.result});
        updateStats();
        refreshPhotoPreview(key);
      };
      r.readAsDataURL(file);
    });
    fileInput.value = "";
  };

  const btn = document.createElement("button");
  btn.className = "photo-btn"; btn.type = "button";
  btn.textContent = "📷 Přidat foto";
  btn.onclick = () => fileInput.click();

  const preview = document.createElement("div");
  preview.className = "photo-preview";
  preview.id = "photo-preview-" + key;

  wrap.appendChild(fileInput);
  wrap.appendChild(btn);
  wrap.appendChild(preview);
  refreshPhotoPreview(key, preview);
  return wrap;
}

function refreshPhotoPreview(key, previewEl) {
  const el = previewEl || document.getElementById("photo-preview-" + key);
  if (!el) return;
  el.innerHTML = "";
  (state.photos[key] || []).forEach((img, i) => {
    const thumb = document.createElement("div"); thumb.className = "photo-thumb";
    const imgEl = document.createElement("img"); imgEl.src = img.data; imgEl.alt = img.name;
    const rmBtn = document.createElement("button"); rmBtn.className = "remove-photo"; rmBtn.type = "button"; rmBtn.textContent = "×";
    rmBtn.onclick = () => { state.photos[key].splice(i, 1); updateStats(); refreshPhotoPreview(key); };
    thumb.appendChild(imgEl); thumb.appendChild(rmBtn);
    el.appendChild(thumb);
  });
}

function infoBtn(text) {
  const escaped = text.replace(/"/g, "&quot;").replace(/'/g, "&#39;");
  return `<button type="button" class="info-btn" tabindex="0">i<span class="tooltip-popup">${escHtml(text)}</span></button>`;
}

function escHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function render() {
  renderTabs();
  const tab = TABS.find(t => t.key === state.activeTab);
  const content = document.getElementById("content");
  content.innerHTML = "";
  tab.groups.forEach(g => {
    const card = document.createElement("div"); card.className = "group-card";
    const hdr = document.createElement("div"); hdr.className = "group-header";
    hdr.style.background = tab.accent; hdr.style.borderLeftColor = tab.color;
    hdr.innerHTML = `<span style="color:${tab.color}">${escHtml(g.title)}</span>`;
    const body = document.createElement("div"); body.className = "group-body";
    g.fields.forEach(f => body.appendChild(renderField(f, tab.color)));
    card.appendChild(hdr); card.appendChild(body);
    content.appendChild(card);
  });
}

// ─── EXPORT ───────────────────────────────────────────────────────────────────
function exportXLSX() {
  const btn = document.getElementById("export-btn");
  btn.disabled = true; btn.textContent = "⏳ Exportuji…";
  try {
    const wb = XLSX.utils.book_new();
    const rows = [["Sekce","Pole","Hodnota","Jednotka","Fotografie"]];
    TABS.forEach(t => {
      rows.push(["=== " + t.label + " ===","","","",""]);
      t.groups.forEach(g => {
        rows.push(["","— " + g.title + " —","","",""]);
        g.fields.forEach(f => {
          const val = f.type==="photo_only" ? "" : (state.data[f.key] ?? "");
          const pics = (state.photos[f.key]||[]).map(p=>p.name).join(", ");
          rows.push(["", f.label, val, f.unit||"", pics]);
        });
      });
    });
    const ws = XLSX.utils.aoa_to_sheet(rows);
    ws["!cols"] = [{wch:30},{wch:50},{wch:30},{wch:12},{wch:35}];
    XLSX.utils.book_append_sheet(wb, ws, "Dotazník");
    XLSX.writeFile(wb, "RBD_Dotaznik.xlsx");
    btn.textContent = "✅ Staženo!"; btn.style.background = "#27ae60";
    setTimeout(()=>{ btn.textContent="⬇ Export XLSX"; btn.style.background="#2ecc71"; btn.disabled=false; }, 3000);
  } catch(e) {
    alert("Chyba exportu: " + e.message);
    btn.textContent = "⬇ Export XLSX"; btn.disabled = false;
  }
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
render();
updateStats();
</script>
